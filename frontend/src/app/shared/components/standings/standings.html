@if (standings.length === 0) {
  <p class="empty-note">No standings available yet.</p>
} @else {
  <table mat-table [dataSource]="standings" class="standings-table mat-elevation-z2">
    <ng-container matColumnDef="rank">
      <th mat-header-cell *matHeaderCellDef>#</th>
      <td mat-cell *matCellDef="let row">{{ row.rank }}</td>
    </ng-container>

    <ng-container matColumnDef="team">
      <th mat-header-cell *matHeaderCellDef>Team</th>
      <td mat-cell *matCellDef="let row">
        <strong>{{ row.teamName }}</strong>
        <span class="tag">{{ row.teamTag }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="wins">
      <th mat-header-cell *matHeaderCellDef>W</th>
      <td mat-cell *matCellDef="let row">{{ row.wins }}</td>
    </ng-container>

    <ng-container matColumnDef="losses">
      <th mat-header-cell *matHeaderCellDef>L</th>
      <td mat-cell *matCellDef="let row">{{ row.losses }}</td>
    </ng-container>

    <ng-container matColumnDef="points">
      <th mat-header-cell *matHeaderCellDef>Pts</th>
      <td mat-cell *matCellDef="let row">{{ row.points }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
}
